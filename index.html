<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과학 스피드 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6fb;min-height:100vh;color:#1a1a1a}
.page{display:none;padding:1.25rem;max-width:600px;margin:0 auto}
.page.active{display:block}
.card{background:#fff;border:1px solid #e8eaed;border-radius:16px;padding:1.25rem}
h1{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
h2{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:1rem}
h3{font-size:15px;font-weight:600;color:#1a1a1a}
p{font-size:14px;color:#666;line-height:1.6}
label{font-size:13px;color:#555;display:block;margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;border:1.5px solid #dde1e8;border-radius:10px;padding:10px 13px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:1.5px solid #dde1e8;background:#fff;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0f2f7}
.btn:active{transform:scale(.98)}
.btn-primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb;border-color:#2563eb}
.btn-danger{background:#ef4444;border-color:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-success{background:#22c55e;border-color:#22c55e;color:#fff}
.btn-success:hover{background:#16a34a}
.btn-warning{background:#f59e0b;border-color:#f59e0b;color:#fff}
.btn-warning:hover{background:#d97706}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:default;transform:none}
.field{margin-bottom:13px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-orange{background:#ffedd5;color:#9a3412}
.divider{border:none;border-top:1px solid #f0f2f7;margin:1rem 0}
.unit-btn{padding:14px 16px;border-radius:12px;border:1.5px solid #e8eaed;background:#fff;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:all .15s}
.unit-btn:hover{background:#eff6ff;border-color:#93c5fd}
.type-btn{padding:11px 14px;border-radius:10px;border:1.5px solid #e8eaed;background:#fff;color:#1a1a1a;font-size:13px;font-weight:500;cursor:pointer;text-align:left;width:100%;font-family:inherit;transition:all .15s;margin-bottom:6px}
.type-btn:hover{background:#f0fdf4;border-color:#86efac}
.quiz-opt{padding:12px 15px;border-radius:12px;border:1.5px solid #e8eaed;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;width:100%;text-align:left;font-family:inherit;font-weight:500;transition:all .15s}
.quiz-opt:hover:not(:disabled){background:#f8faff;border-color:#93c5fd}
.quiz-opt.correct{background:#dcfce7;border-color:#4ade80;color:#15803d}
.quiz-opt.wrong{background:#fee2e2;border-color:#f87171;color:#b91c1c}
.quiz-opt:disabled{cursor:default}
.progress-wrap{background:#e8eaed;border-radius:99px;height:7px;margin-bottom:1.1rem}
.progress-bar{background:#3b82f6;height:7px;border-radius:99px;transition:width .35s}
.result-circle{width:88px;height:88px;border-radius:50%;border:4px solid #3b82f6;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:24px;font-weight:700;color:#3b82f6}
.tab{display:flex;gap:4px;margin-bottom:1rem;background:#f0f2f7;padding:4px;border-radius:12px}
.tab-btn{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;color:#666;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.qlist{display:flex;flex-direction:column;gap:8px}
.qitem{padding:11px 13px;border-radius:12px;border:1.5px solid #e8eaed;font-size:13px;background:#fff}
.wrong-q{border-color:#fca5a5;background:#fff5f5}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;font-weight:500}
.alert-info{background:#dbeafe;color:#1d4ed8}
.alert-warn{background:#fef3c7;color:#92400e}
.alert-success{background:#dcfce7;color:#15803d}
.alert-pending{background:#f1f5f9;color:#475569}
.short-row{display:flex;gap:8px;align-items:center}
.correct-pill{background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.wrong-pill{background:#fee2e2;color:#b91c1c;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;gap:12px}
.spinner{width:30px;height:30px;border:3px solid #e8eaed;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.row{display:flex;gap:8px;align-items:flex-end}
.answer-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;color:#92400e;margin-top:8px;display:none}
.quiz-action-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.breadcrumb{font-size:12px;color:#999;margin-bottom:8px}
.breadcrumb span{color:#3b82f6;cursor:pointer}
.breadcrumb span:hover{text-decoration:underline}
/* 대기 중 배너 */
.pending-banner{background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem}
</style>
</head>
<body>

<!-- 홈 -->
<div id="pg-home" class="page active" style="padding-top:3rem">
  <div style="text-align:center;margin-bottom:2.5rem">
    <div style="font-size:48px;margin-bottom:10px">🔬</div>
    <h1>과학 스피드 퀴즈</h1>
    <p style="margin-top:6px">단원별 퀴즈를 풀고 실력을 확인해보세요</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto">
    <button class="btn btn-primary" style="padding:13px" onclick="go('pg-student-login')">🙋 학생 로그인</button>
    <button class="btn" style="padding:13px" onclick="go('pg-teacher-login')">⚙️ 선생님 모드</button>
  </div>
</div>

<!-- 학생 로그인 -->
<div id="pg-student-login" class="page">
  <button class="btn btn-sm" onclick="go('pg-home')" style="margin-bottom:1rem">← 뒤로</button>
  <div class="card" style="max-width:380px;margin:0 auto">
    <h2>학생 로그인</h2>
    <div class="field"><label>이름</label><input id="s-name" type="text" placeholder="홍길동" autocomplete="off"></div>
    <div class="field"><label>비밀번호</label><input id="s-pw" type="password" placeholder="비밀번호 입력"></div>
    <div id="s-err" class="alert alert-warn" style="display:none"></div>
    <button id="s-login-btn" class="btn btn-primary" style="width:100%" onclick="studentLogin()">로그인</button>
    <hr class="divider">
    <p style="font-size:12px;text-align:center">계정이 없나요? <span style="color:#3b82f6;cursor:pointer;font-weight:600" onclick="go('pg-student-register')">회원가입</span></p>
  </div>
</div>

<!-- 학생 회원가입 -->
<div id="pg-student-register" class="page">
  <button class="btn btn-sm" onclick="go('pg-student-login')" style="margin-bottom:1rem">← 뒤로</button>
  <div class="card" style="max-width:380px;margin:0 auto">
    <h2>학생 회원가입</h2>
    <div class="field"><label>이름</label><input id="r-name" type="text" placeholder="홍길동" autocomplete="off"></div>
    <div class="field"><label>비밀번호 설정</label><input id="r-pw" type="password" placeholder="비밀번호 입력"></div>
    <div class="field"><label>비밀번호 확인</label><input id="r-pw2" type="password" placeholder="비밀번호 재입력"></div>
    <div id="r-err" class="alert alert-warn" style="display:none"></div>
    <button id="r-btn" class="btn btn-primary" style="width:100%" onclick="studentRegister()">가입 신청</button>
  </div>
</div>

<!-- 승인 대기 화면 -->
<div id="pg-pending" class="page" style="padding-top:3rem">
  <div class="card" style="max-width:380px;margin:0 auto;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">⏳</div>
    <h2>승인 대기 중</h2>
    <p style="margin-bottom:1.5rem">선생님이 계정을 승인하면<br>로그인할 수 있어요.<br>선생님께 말씀해주세요!</p>
    <button class="btn" style="width:100%" onclick="go('pg-home')">홈으로</button>
  </div>
</div>

<!-- 단원 선택 -->
<div id="pg-units" class="page">
  <div class="top-bar">
    <div>
      <h2 style="margin-bottom:2px">단원 선택</h2>
      <p id="student-greeting" style="font-size:12px"></p>
    </div>
    <button class="btn btn-sm" onclick="logout()">로그아웃</button>
  </div>
  <div class="tab">
    <button class="tab-btn active" onclick="switchStudentTab('tab-units',this)">퀴즈 풀기</button>
    <button class="tab-btn" onclick="switchStudentTab('tab-wrongnote',this)">오답노트</button>
    <button class="tab-btn" onclick="switchStudentTab('tab-stats',this)">내 기록</button>
  </div>
  <div id="tab-units"><div id="unit-list" class="qlist"></div></div>
  <div id="tab-wrongnote" style="display:none"><div id="wrong-unit-list" class="qlist"></div></div>
  <div id="tab-stats" style="display:none"><div id="stats-content"></div></div>
</div>

<!-- 유형 선택 -->
<div id="pg-types" class="page">
  <div class="breadcrumb" id="type-breadcrumb"></div>
  <div class="top-bar">
    <h2 style="margin-bottom:0" id="type-page-title">유형 선택</h2>
    <button class="btn btn-sm" onclick="go('pg-units')">← 단원 목록</button>
  </div>
  <div id="type-list" class="qlist"></div>
</div>

<!-- 퀴즈 -->
<div id="pg-quiz" class="page">
  <div class="breadcrumb" id="quiz-breadcrumb"></div>
  <div class="top-bar">
    <h3 id="quiz-unit-title" style="font-size:13px;color:#666;font-weight:500"></h3>
    <span id="quiz-counter" class="badge badge-blue"></span>
  </div>
  <div class="progress-wrap"><div id="quiz-progress" class="progress-bar" style="width:0%"></div></div>
  <div class="card" style="margin-bottom:1rem">
    <p id="quiz-q-type" style="font-size:11px;color:#999;margin-bottom:6px;font-weight:600;letter-spacing:.5px"></p>
    <p id="quiz-question" style="font-size:16px;color:#1a1a1a;font-weight:600;line-height:1.6"></p>
  </div>
  <div id="quiz-choices" style="display:flex;flex-direction:column;gap:9px"></div>
  <div id="quiz-short-area" style="display:none;margin-top:10px">
    <div class="short-row">
      <input id="quiz-short-input" type="text" placeholder="정답을 입력하세요">
      <button class="btn btn-primary" onclick="submitShort()" style="white-space:nowrap">확인</button>
    </div>
  </div>
  <div id="quiz-feedback" style="display:none;margin-top:1rem" class="alert"></div>
  <div id="answer-reveal-box" class="answer-box"></div>
  <div id="quiz-action-row" class="quiz-action-row" style="display:none">
    <button id="btn-show-answer" class="btn btn-warning btn-sm" onclick="showAnswer()" style="display:none">🔍 정답 확인</button>
    <button id="btn-retry-now" class="btn btn-success btn-sm" onclick="retryNow()" style="display:none">🔄 다시 풀기</button>
    <button id="quiz-next-btn" class="btn btn-primary btn-sm" style="display:none" onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<!-- 즉시 다시 풀기 화면 -->
<div id="pg-retry-now" class="page">
  <div class="breadcrumb" id="retrynow-breadcrumb"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <h3 id="retrynow-title" style="font-size:13px;color:#666;font-weight:500"></h3>
    <span class="badge badge-orange">유사 문제 도전</span>
  </div>
  <div class="progress-wrap" style="height:5px"><div style="background:#f59e0b;height:5px;border-radius:99px;width:100%"></div></div>
  <div class="card" style="margin-bottom:1rem">
    <p id="rn-q-type" style="font-size:11px;color:#999;margin-bottom:6px;font-weight:600"></p>
    <p id="rn-question" style="font-size:16px;color:#1a1a1a;font-weight:600;line-height:1.6"></p>
  </div>
  <div id="rn-choices" style="display:flex;flex-direction:column;gap:9px"></div>
  <div id="rn-short-area" style="display:none;margin-top:10px">
    <div class="short-row">
      <input id="rn-short-input" type="text" placeholder="정답을 입력하세요">
      <button class="btn btn-primary" onclick="submitRnShort()" style="white-space:nowrap">확인</button>
    </div>
  </div>
  <div id="rn-feedback" style="display:none;margin-top:1rem" class="alert"></div>
  <div id="rn-answer-box" class="answer-box"></div>
  <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
    <button id="rn-show-answer-btn" class="btn btn-warning btn-sm" onclick="showRnAnswer()" style="display:none">🔍 정답 확인</button>
    <button class="btn btn-primary btn-sm" id="rn-back-btn" style="display:none" onclick="backFromRetryNow()">퀴즈로 돌아가기 →</button>
  </div>
</div>

<!-- 결과 -->
<div id="pg-result" class="page" style="text-align:center;padding-top:2rem">
  <div class="card" style="max-width:380px;margin:0 auto">
    <h2>퀴즈 완료! 🎉</h2>
    <div class="result-circle" id="result-score"></div>
    <p id="result-msg" style="margin-bottom:1.25rem;font-size:15px;color:#1a1a1a;font-weight:500"></p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.25rem">
      <div style="background:#f0fdf4;border-radius:12px;padding:12px">
        <p style="font-size:11px;color:#15803d;font-weight:600">맞춘 문제</p>
        <p id="r-correct" style="font-size:22px;font-weight:700;color:#15803d"></p>
      </div>
      <div style="background:#fff5f5;border-radius:12px;padding:12px">
        <p style="font-size:11px;color:#b91c1c;font-weight:600">틀린 문제</p>
        <p id="r-wrong" style="font-size:22px;font-weight:700;color:#b91c1c"></p>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="go('pg-units')">단원 목록으로</button>
      <button id="retry-wrong-btn" class="btn" onclick="retryWrong()">오답 다시 풀기</button>
    </div>
  </div>
</div>

<!-- 선생님 로그인 -->
<div id="pg-teacher-login" class="page">
  <button class="btn btn-sm" onclick="go('pg-home')" style="margin-bottom:1rem">← 뒤로</button>
  <div class="card" style="max-width:380px;margin:0 auto">
    <h2>🔐 선생님 모드</h2>
    <div class="field"><label>관리자 비밀번호</label><input id="t-pw" type="password" placeholder="비밀번호 입력"></div>
    <div id="t-err" class="alert alert-warn" style="display:none"></div>
    <button id="t-login-btn" class="btn btn-primary" style="width:100%" onclick="teacherLogin()">입장</button>
    <p style="font-size:11px;color:#999;margin-top:10px;text-align:center">초기 비밀번호: <strong>teacher1234</strong></p>
  </div>
</div>

<!-- 선생님 대시보드 -->
<div id="pg-teacher" class="page">
  <div class="top-bar">
    <h2 style="margin-bottom:0">선생님 관리 페이지</h2>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="go('pg-teacher-pw')">🔑 비밀번호</button>
      <button class="btn btn-sm" onclick="go('pg-home')">로그아웃</button>
    </div>
  </div>
  <div class="tab">
    <button class="tab-btn active" onclick="switchTeacherTab('t-tab-units',this)">단원/유형 관리</button>
    <button class="tab-btn" onclick="switchTeacherTab('t-tab-add-q',this)">문제 추가</button>
    <button class="tab-btn" onclick="switchTeacherTab('t-tab-students',this)">학생 관리</button>
  </div>
  <!-- 단원/유형 관리 -->
  <div id="t-tab-units">
    <div style="margin-bottom:1rem">
      <p style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a1a">📚 단원 추가</p>
      <div class="field row">
        <div style="flex:1"><label>단원 이름</label><input id="new-unit-name" type="text" placeholder="예: 1단원 물질의 변화"></div>
        <button class="btn btn-primary" onclick="addUnit()">추가</button>
      </div>
    </div>
    <div style="margin-bottom:1rem">
      <p style="font-size:13px;font-weight:600;margin-bottom:8px;color:#1a1a1a">🗂️ 유형 추가</p>
      <div class="field"><label>단원 선택</label><select id="type-unit-sel"></select></div>
      <div class="field row">
        <div style="flex:1"><label>유형 이름</label><input id="new-type-name" type="text" placeholder="예: 화학 반응식 완성"></div>
        <button class="btn btn-primary" onclick="addType()">추가</button>
      </div>
    </div>
    <div id="teacher-unit-list" class="qlist"></div>
  </div>
  <!-- 문제 추가 -->
  <div id="t-tab-add-q" style="display:none">
    <div class="field"><label>단원 선택</label><select id="q-unit-sel" onchange="onQUnitChange()"></select></div>
    <div class="field"><label>유형 선택</label><select id="q-type-sel2"></select></div>
    <div class="field"><label>문제 유형</label>
      <select id="q-format-sel" onchange="toggleQFormat()">
        <option value="mc">객관식 (4지선다)</option>
        <option value="sa">단답형</option>
      </select>
    </div>
    <div class="field"><label>문제</label><textarea id="q-text" placeholder="문제를 입력하세요"></textarea></div>
    <div id="mc-fields">
      <div class="field"><label>보기 1</label><input id="opt1" type="text"></div>
      <div class="field"><label>보기 2</label><input id="opt2" type="text"></div>
      <div class="field"><label>보기 3</label><input id="opt3" type="text"></div>
      <div class="field"><label>보기 4</label><input id="opt4" type="text"></div>
      <div class="field"><label>정답 번호 (1~4)</label><input id="mc-ans" type="number" min="1" max="4" style="width:80px"></div>
    </div>
    <div id="sa-fields" style="display:none">
      <div class="field"><label>정답</label><input id="sa-ans" type="text" placeholder="정답 입력"></div>
    </div>
    <div id="q-err" class="alert alert-warn" style="display:none"></div>
    <button class="btn btn-primary" onclick="addQuestion()">💾 문제 저장</button>
    <hr class="divider">
    <h3 style="margin-bottom:10px">저장된 문제 목록</h3>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1"><label style="font-size:12px">단원</label><select id="q-filter-unit" onchange="onFilterUnitChange()"></select></div>
      <div style="flex:1"><label style="font-size:12px">유형</label><select id="q-filter-type" onchange="renderQList()"></select></div>
    </div>
    <div id="q-list" class="qlist"></div>
  </div>
  <!-- 학생 관리 -->
  <div id="t-tab-students" style="display:none">
    <div id="pending-section" style="margin-bottom:1.5rem">
      <p style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px">⏳ 승인 대기 중 <span id="pending-count" class="badge badge-red" style="margin-left:4px"></span></p>
      <div id="pending-list" class="qlist"></div>
    </div>
    <hr class="divider">
    <p style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px">✅ 승인된 학생</p>
    <div id="student-list" class="qlist"></div>
  </div>
</div>

<!-- 선생님 비밀번호 변경 -->
<div id="pg-teacher-pw" class="page">
  <button class="btn btn-sm" onclick="go('pg-teacher')" style="margin-bottom:1rem">← 뒤로</button>
  <div class="card" style="max-width:380px;margin:0 auto">

    <div class="field"><label>새 비밀번호</label><input id="pw-new" type="password"></div>
    <div class="field"><label>새 비밀번호 확인</label><input id="pw-new2" type="password"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, remove, push, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJEqEp3Md3ulDLctm0mrULQBmSdhVNGZs",
  authDomain: "overdrivescience.firebaseapp.com",
  databaseURL: "https://overdrivescience-default-rtdb.firebaseio.com",
  projectId: "overdrivescience",
  storageBucket: "overdrivescience.firebasestorage.app",
  messagingSenderId: "289359716571",
  appId: "1:289359716571:web:190bf0587fb11f86f7ecfe"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

async function dbGet(path){ const s=await get(ref(db,path)); return s.exists()?s.val():null; }
async function dbSet(path,val){ await set(ref(db,path),val); }
async function dbDel(path){ await remove(ref(db,path)); }

// ── state ──────────────────────────────────────────────────────────
let currentStudent=null, currentUnit=null, currentTypeObj=null;
let quizQuestions=[], quizIndex=0, quizCorrect=0, quizWrong=[], isRetry=false;
let retryNowQuestion=null, retryNowOrigQ=null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function showErr(id,msg){ const e=document.getElementById(id); e.style.display='block'; e.textContent=msg; }
function hideErr(id){ document.getElementById(id).style.display='none'; }
function spinner(){ return '<div class="spinner-wrap"><div class="spinner"></div><p style="font-size:13px;color:#999">불러오는 중...</p></div>'; }

function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
  if(page==='pg-units') renderUnitsPage();
  if(page==='pg-teacher') renderTeacherPage();
}
window.go=go;
function logout(){ currentStudent=null; go('pg-home'); }
window.logout=logout;

function setBtnLoading(id,loading,label){
  const b=document.getElementById(id); if(!b) return;
  b.disabled=loading; b.textContent=loading?'처리 중...':label;
}

// ── student auth ───────────────────────────────────────────────────
async function studentLogin(){
  const name=document.getElementById('s-name').value.trim();
  const pw=document.getElementById('s-pw').value;
  if(!name||!pw){ showErr('s-err','이름과 비밀번호를 입력하세요'); return; }
  setBtnLoading('s-login-btn',true,'로그인');
  try{
    const sd=await dbGet('students/'+name);
    if(!sd){ showErr('s-err','등록되지 않은 학생입니다'); return; }
    if(sd.pw!==pw){ showErr('s-err','비밀번호가 틀렸습니다'); return; }
    if(sd.status==='pending'){ hideErr('s-err'); go('pg-pending'); return; }
    hideErr('s-err'); currentStudent=name; go('pg-units');
  } finally { setBtnLoading('s-login-btn',false,'로그인'); }
}
window.studentLogin=studentLogin;

async function studentRegister(){
  const name=document.getElementById('r-name').value.trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  if(!name||!pw){ showErr('r-err','이름과 비밀번호를 입력하세요'); return; }
  if(pw!==pw2){ showErr('r-err','비밀번호가 일치하지 않습니다'); return; }
  setBtnLoading('r-btn',true,'가입 신청');
  try{
    const ex=await dbGet('students/'+name);
    if(ex){ showErr('r-err','이미 존재하는 이름입니다'); return; }
    await dbSet('students/'+name,{pw, status:'pending', wrong:{}, history:{}});
    hideErr('r-err'); go('pg-pending');
  } finally { setBtnLoading('r-btn',false,'가입 신청'); }
}
window.studentRegister=studentRegister;

// ── student tabs ───────────────────────────────────────────────────
function switchStudentTab(tabId,btn){
  document.querySelectorAll('#pg-units .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-units','tab-wrongnote','tab-stats'].forEach(id=>{
    document.getElementById(id).style.display=id===tabId?'block':'none';
  });
  if(tabId==='tab-wrongnote') renderWrongNote();
  if(tabId==='tab-stats') renderStats();
}
window.switchStudentTab=switchStudentTab;

async function renderUnitsPage(){
  document.getElementById('student-greeting').textContent=currentStudent+'님, 안녕하세요! 👋';
  document.querySelectorAll('#pg-units .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  ['tab-wrongnote','tab-stats'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('tab-units').style.display='block';
  const ul=document.getElementById('unit-list');
  ul.innerHTML=spinner();
  const units=await dbGet('units')||{};
  ul.innerHTML='';
  const arr=Object.values(units);
  if(!arr.length){ ul.innerHTML='<p style="font-size:14px;color:#999;text-align:center;padding:1rem">등록된 단원이 없습니다.</p>'; return; }
  for(const u of arr){
    const types=await dbGet('types/'+u.id)||{};
    const typeCnt=Object.keys(types).length;
    const btn=document.createElement('button');
    btn.className='unit-btn';
    btn.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <span>${u.name}</span><span class="badge badge-blue">${typeCnt}개 유형</span></div>`;
    btn.onclick=()=>openTypes(u);
    ul.appendChild(btn);
  }
}

async function openTypes(unit){
  currentUnit=unit;
  document.getElementById('type-page-title').textContent=unit.name;
  document.getElementById('type-breadcrumb').innerHTML=`<span onclick="go('pg-units')">단원 목록</span> › ${unit.name}`;
  const tl=document.getElementById('type-list');
  tl.innerHTML=spinner();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-types').classList.add('active');
  const types=await dbGet('types/'+unit.id)||{};
  tl.innerHTML='';
  const arr=Object.values(types);
  if(!arr.length){ tl.innerHTML='<p style="font-size:14px;color:#999;text-align:center;padding:1rem">등록된 유형이 없습니다.</p>'; return; }
  for(const t of arr){
    const qs=await dbGet('questions/'+unit.id+'/'+t.id)||{};
    const cnt=Object.keys(qs).length;
    const btn=document.createElement('button');
    btn.className='type-btn';
    btn.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <span>📂 ${t.name}</span><span class="badge badge-green">${cnt}문제</span></div>`;
    btn.onclick=()=>startQuiz(unit,t);
    tl.appendChild(btn);
  }
}
window.openTypes=openTypes;

async function renderWrongNote(){
  const el=document.getElementById('wrong-unit-list');
  el.innerHTML=spinner();
  const sd=await dbGet('students/'+currentStudent);
  const units=await dbGet('units')||{};
  el.innerHTML='';
  let hasAny=false;
  for(const u of Object.values(units)){
    const types=await dbGet('types/'+u.id)||{};
    for(const t of Object.values(types)){
      const key=u.id+'__'+t.id;
      const wrongIds=Object.values((sd&&sd.wrong&&sd.wrong[key])||{});
      if(!wrongIds.length) continue;
      const qs=await dbGet('questions/'+u.id+'/'+t.id)||{};
      const qArr=Object.values(qs);
      const wq=wrongIds.map(id=>qArr.find(q=>q.id===id)).filter(Boolean);
      if(!wq.length) continue;
      hasAny=true;
      const wrap=document.createElement('div');
      wrap.className='card'; wrap.style.marginBottom='10px';
      wrap.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><p style="font-size:13px;font-weight:600">${u.name}</p><p style="font-size:11px;color:#999">📂 ${t.name}</p></div>
        <span class="badge badge-red">${wq.length}개 오답</span></div>`;
      wq.forEach(q=>{
        const qi=document.createElement('div');
        qi.className='qitem wrong-q'; qi.style.marginBottom='5px'; qi.textContent=q.text;
        wrap.appendChild(qi);
      });
      const btn=document.createElement('button');
      btn.className='btn btn-primary'; btn.style.marginTop='10px'; btn.style.width='100%';
      btn.textContent='🔄 오답 다시 풀기';
      const _u=u, _t=t;
      btn.onclick=()=>startRetry(_u,_t);
      wrap.appendChild(btn);
      el.appendChild(wrap);
    }
  }
  if(!hasAny) el.innerHTML='<p style="font-size:14px;color:#999;text-align:center;padding:2rem">오답이 없습니다. 훌륭해요! 🎉</p>';
}

async function renderStats(){
  const el=document.getElementById('stats-content');
  el.innerHTML=spinner();
  const sd=await dbGet('students/'+currentStudent);
  const histObj=(sd&&sd.history)||{};
  const hist=Object.values(histObj);
  if(!hist.length){ el.innerHTML='<p style="font-size:14px;color:#999;text-align:center;padding:1rem">아직 퀴즈를 풀지 않았습니다.</p>'; return; }
  const units=await dbGet('units')||{};
  const uArr=Object.values(units);
  let html='<div class="qlist">';
  hist.slice().reverse().forEach(h=>{
    const u=uArr.find(u=>u.id===h.unitId);
    const pct=Math.round(h.correct/h.total*100);
    html+=`<div class="qitem" style="display:flex;justify-content:space-between;align-items:center">
      <div><p style="font-size:13px;font-weight:600">${u?u.name:'(삭제된 단원)'}${h.typeName?' › '+h.typeName:''}</p>
      <p style="font-size:11px;color:#999;margin-top:2px">${h.date}${h.retry?' · 오답 재도전':''}</p></div>
      <span class="${pct>=80?'correct-pill':'wrong-pill'}">${h.correct}/${h.total} (${pct}%)</span>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

// ── quiz ───────────────────────────────────────────────────────────
async function startQuiz(unit, typeObj){
  currentUnit=unit; currentTypeObj=typeObj; isRetry=false;
  const qObj=await dbGet('questions/'+unit.id+'/'+typeObj.id)||{};
  const pool=Object.values(qObj);
  if(!pool.length){ alert('문제가 없습니다. 선생님께 문의하세요.'); return; }
  quizQuestions=pool.sort(()=>Math.random()-.5).slice(0,Math.min(20,pool.length));
  quizIndex=0; quizCorrect=0; quizWrong=[];
  document.getElementById('quiz-unit-title').textContent=unit.name+' › '+typeObj.name;
  document.getElementById('quiz-breadcrumb').innerHTML=
    `<span onclick="go('pg-units')">단원 목록</span> › <span onclick="openTypes(currentUnit)">${unit.name}</span> › ${typeObj.name}`;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-quiz').classList.add('active');
  showQuestion();
}
window.startQuiz=startQuiz;

async function startRetry(unit, typeObj){
  currentUnit=unit; currentTypeObj=typeObj; isRetry=true;
  const sd=await dbGet('students/'+currentStudent);
  const key=unit.id+'__'+typeObj.id;
  const wrongIds=Object.values((sd&&sd.wrong&&sd.wrong[key])||{});
  const qObj=await dbGet('questions/'+unit.id+'/'+typeObj.id)||{};
  const pool=wrongIds.map(id=>Object.values(qObj).find(q=>q.id===id)).filter(Boolean);
  if(!pool.length){ alert('오답이 없습니다!'); return; }
  quizQuestions=pool.sort(()=>Math.random()-.5);
  quizIndex=0; quizCorrect=0; quizWrong=[];
  document.getElementById('quiz-unit-title').textContent=unit.name+' › '+typeObj.name+' (오답 재도전)';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-quiz').classList.add('active');
  showQuestion();
}

async function retryWrong(){ if(currentUnit&&currentTypeObj) await startRetry(currentUnit,currentTypeObj); }
window.retryWrong=retryWrong;

function showQuestion(){
  const q=quizQuestions[quizIndex], total=quizQuestions.length;
  document.getElementById('quiz-counter').textContent=(quizIndex+1)+' / '+total;
  document.getElementById('quiz-progress').style.width=(quizIndex/total*100)+'%';
  document.getElementById('quiz-question').textContent=q.text;
  document.getElementById('quiz-q-type').textContent=q.format==='mc'?'객관식':'단답형';
  document.getElementById('quiz-feedback').style.display='none';
  document.getElementById('answer-reveal-box').style.display='none';
  document.getElementById('quiz-action-row').style.display='none';
  document.getElementById('btn-show-answer').style.display='none';
  document.getElementById('btn-retry-now').style.display='none';
  document.getElementById('quiz-next-btn').style.display='none';
  const choices=document.getElementById('quiz-choices');
  const shortArea=document.getElementById('quiz-short-area');
  choices.innerHTML='';
  if(q.format==='mc'){
    shortArea.style.display='none'; choices.style.display='flex';
    q.opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='quiz-opt'; btn.textContent=(i+1)+'. '+opt;
      btn.onclick=()=>submitMC(i,btn,q);
      choices.appendChild(btn);
    });
  } else {
    choices.style.display='none'; shortArea.style.display='block';
    document.getElementById('quiz-short-input').value='';
    document.getElementById('quiz-short-input').disabled=false;
    setTimeout(()=>document.getElementById('quiz-short-input').focus(),100);
  }
}

function revealActionRow(isWrong){
  document.getElementById('quiz-action-row').style.display='flex';
  document.getElementById('quiz-next-btn').style.display='inline-flex';
  if(isWrong){
    document.getElementById('btn-show-answer').style.display='inline-flex';
    document.getElementById('btn-retry-now').style.display='inline-flex';
  }
}

function showAnswer(){
  const q=quizQuestions[quizIndex];
  const box=document.getElementById('answer-reveal-box');
  const ans=q.format==='mc'?(q.ans+1)+'. '+q.opts[q.ans]:q.ans;
  box.textContent='💡 정답: '+ans;
  box.style.display='block';
  document.getElementById('btn-show-answer').style.display='none';
}
window.showAnswer=showAnswer;

async function retryNow(){
  const origQ=quizQuestions[quizIndex];
  // 같은 유형에서 다른 문제 랜덤 1개
  const qObj=await dbGet('questions/'+currentUnit.id+'/'+currentTypeObj.id)||{};
  const all=Object.values(qObj).filter(q=>q.id!==origQ.id);
  if(!all.length){ alert('같은 유형에 다른 문제가 없습니다.'); return; }
  const pick=all[Math.floor(Math.random()*all.length)];
  retryNowOrigQ=origQ;
  retryNowQuestion=pick;
  document.getElementById('retrynow-title').textContent=currentUnit.name+' › '+currentTypeObj.name;
  document.getElementById('retrynow-breadcrumb').innerHTML=
    `<span onclick="go('pg-units')">단원 목록</span> › ${currentUnit.name} › ${currentTypeObj.name}`;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-retry-now').classList.add('active');
  showRnQuestion(pick);
}
window.retryNow=retryNow;

function showRnQuestion(q){
  document.getElementById('rn-question').textContent=q.text;
  document.getElementById('rn-q-type').textContent=q.format==='mc'?'객관식':'단답형';
  document.getElementById('rn-feedback').style.display='none';
  document.getElementById('rn-answer-box').style.display='none';
  document.getElementById('rn-show-answer-btn').style.display='none';
  document.getElementById('rn-back-btn').style.display='none';
  const choices=document.getElementById('rn-choices');
  const shortArea=document.getElementById('rn-short-area');
  choices.innerHTML='';
  if(q.format==='mc'){
    shortArea.style.display='none'; choices.style.display='flex';
    q.opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='quiz-opt'; btn.textContent=(i+1)+'. '+opt;
      btn.onclick=()=>submitRnMC(i,btn,q);
      choices.appendChild(btn);
    });
  } else {
    choices.style.display='none'; shortArea.style.display='block';
    document.getElementById('rn-short-input').value='';
    document.getElementById('rn-short-input').disabled=false;
    setTimeout(()=>document.getElementById('rn-short-input').focus(),100);
  }
}

function submitRnMC(chosen,btn,q){
  document.querySelectorAll('#rn-choices .quiz-opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('rn-feedback'); fb.style.display='block';
  if(chosen===q.ans){
    btn.classList.add('correct'); fb.className='alert alert-success'; fb.textContent='✅ 정답입니다!';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#rn-choices .quiz-opt')[q.ans].classList.add('correct');
    fb.className='alert alert-warn'; fb.textContent='❌ 오답! ';
    document.getElementById('rn-show-answer-btn').style.display='inline-flex';
  }
  document.getElementById('rn-back-btn').style.display='inline-flex';
}
window.submitRnMC=submitRnMC;

async function submitRnShort(){
  const q=retryNowQuestion;
  const inp=document.getElementById('rn-short-input');
  const val=inp.value.trim(); if(!val) return;
  inp.disabled=true;
  const fb=document.getElementById('rn-feedback'); fb.style.display='block';
  if(val.toLowerCase()===String(q.ans).toLowerCase()){
    fb.className='alert alert-success'; fb.textContent='✅ 정답입니다!';
  } else {
    fb.className='alert alert-warn'; fb.textContent='❌ 오답!';
    document.getElementById('rn-show-answer-btn').style.display='inline-flex';
  }
  document.getElementById('rn-back-btn').style.display='inline-flex';
}
window.submitRnShort=submitRnShort;

function showRnAnswer(){
  const q=retryNowQuestion;
  const box=document.getElementById('rn-answer-box');
  const ans=q.format==='mc'?(q.ans+1)+'. '+q.opts[q.ans]:q.ans;
  box.textContent='💡 정답: '+ans;
  box.style.display='block';
  document.getElementById('rn-show-answer-btn').style.display='none';
}
window.showRnAnswer=showRnAnswer;

function backFromRetryNow(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-quiz').classList.add('active');
}
window.backFromRetryNow=backFromRetryNow;

document.getElementById('rn-short-input').addEventListener('keydown',e=>{ if(e.key==='Enter') submitRnShort(); });

async function submitMC(chosen,btn,q){
  document.querySelectorAll('#quiz-choices .quiz-opt').forEach(b=>b.disabled=true);
  const fb=document.getElementById('quiz-feedback'); fb.style.display='block';
  const isWrong=chosen!==q.ans;
  if(!isWrong){
    btn.classList.add('correct'); quizCorrect++;
    fb.className='alert alert-info'; fb.textContent='✅ 정답입니다!';
    if(isRetry) await removeFromWrong(q.id);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#quiz-choices .quiz-opt')[q.ans].classList.add('correct');
    fb.className='alert alert-warn'; fb.textContent='❌ 오답입니다.';
    quizWrong.push(q.id); await addToWrong(q.id);
  }
  revealActionRow(isWrong);
}
window.submitMC=submitMC;

async function submitShort(){
  const q=quizQuestions[quizIndex];
  const inp=document.getElementById('quiz-short-input');
  const val=inp.value.trim(); if(!val) return;
  inp.disabled=true;
  const fb=document.getElementById('quiz-feedback'); fb.style.display='block';
  const ok=val.toLowerCase()===String(q.ans).toLowerCase();
  if(ok){
    quizCorrect++; fb.className='alert alert-info'; fb.textContent='✅ 정답입니다!';
    if(isRetry) await removeFromWrong(q.id);
    revealActionRow(false);
  } else {
    fb.className='alert alert-warn'; fb.textContent='❌ 오답입니다.';
    quizWrong.push(q.id); await addToWrong(q.id);
    revealActionRow(true);
  }
}
window.submitShort=submitShort;

document.getElementById('quiz-short-input').addEventListener('keydown',e=>{ if(e.key==='Enter') submitShort(); });

async function addToWrong(qid){
  if(!currentStudent||!currentUnit||!currentTypeObj) return;
  const key=currentUnit.id+'__'+currentTypeObj.id;
  const path='students/'+currentStudent+'/wrong/'+key;
  const cur=await dbGet(path)||{};
  if(!Object.values(cur).includes(qid)){ await dbSet(path+'/'+uid(),qid); }
}
async function removeFromWrong(qid){
  if(!currentStudent||!currentUnit||!currentTypeObj) return;
  const key=currentUnit.id+'__'+currentTypeObj.id;
  const path='students/'+currentStudent+'/wrong/'+key;
  const cur=await dbGet(path)||{};
  for(const [k,v] of Object.entries(cur)){ if(v===qid){ await dbDel(path+'/'+k); break; } }
}

function nextQuestion(){ quizIndex++; if(quizIndex>=quizQuestions.length) finishQuiz(); else showQuestion(); }
window.nextQuestion=nextQuestion;

async function finishQuiz(){
  const total=quizQuestions.length, pct=Math.round(quizCorrect/total*100);
  document.getElementById('result-score').textContent=pct+'%';
  document.getElementById('r-correct').textContent=quizCorrect+'개';
  document.getElementById('r-wrong').textContent=(total-quizCorrect)+'개';
  document.getElementById('result-msg').textContent=
    pct>=90?'완벽해요! 🌟':pct>=70?'잘 했어요! 💪':'오답노트로 복습해봐요! 📚';
  document.getElementById('retry-wrong-btn').style.display=quizWrong.length?'flex':'none';
  if(currentStudent&&currentUnit&&currentTypeObj){
    const hKey=uid();
    await dbSet('students/'+currentStudent+'/history/'+hKey,{
      unitId:currentUnit.id, typeName:currentTypeObj.name,
      correct:quizCorrect, total, date:new Date().toLocaleDateString('ko-KR'), retry:isRetry
    });
  }
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-result').classList.add('active');
}

// ── teacher auth ───────────────────────────────────────────────────
async function teacherLogin(){
  const pw=document.getElementById('t-pw').value;
  setBtnLoading('t-login-btn',true,'입장');
  try{
    const cfg=await dbGet('config')||{teacherPw:'teacher1234'};
    if(pw!==cfg.teacherPw){ showErr('t-err','비밀번호가 틀렸습니다'); return; }
    hideErr('t-err'); go('pg-teacher');
  } finally { setBtnLoading('t-login-btn',false,'입장'); }
}
window.teacherLogin=teacherLogin;

async function changePw(){
  const old=document.getElementById('pw-old').value;
  const nw=document.getElementById('pw-new').value;
  const nw2=document.getElementById('pw-new2').value;
  const cfg=await dbGet('config')||{teacherPw:'teacher1234'};
  if(old!==cfg.teacherPw){ showErr('pw-err','현재 비밀번호가 틀렸습니다'); document.getElementById('pw-ok').style.display='none'; return; }
  if(!nw){ showErr('pw-err','새 비밀번호를 입력하세요'); return; }
  if(nw!==nw2){ showErr('pw-err','비밀번호가 일치하지 않습니다'); return; }
  cfg.teacherPw=nw; await dbSet('config',cfg);
  hideErr('pw-err');
  document.getElementById('pw-ok').style.display='block';
  document.getElementById('pw-ok').textContent='비밀번호가 변경되었습니다!';
}
window.changePw=changePw;

// ── teacher tabs ───────────────────────────────────────────────────
function switchTeacherTab(tabId,btn){
  document.querySelectorAll('#pg-teacher .tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['t-tab-units','t-tab-add-q','t-tab-students'].forEach(id=>{
    document.getElementById(id).style.display=id===tabId?'block':'none';
  });
  if(tabId==='t-tab-add-q'){ populateAllSelects(); renderQList(); }
  if(tabId==='t-tab-students') renderStudentList();
}
window.switchTeacherTab=switchTeacherTab;

async function renderTeacherPage(){
  document.querySelectorAll('#pg-teacher .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  ['t-tab-add-q','t-tab-students'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('t-tab-units').style.display='block';
  await renderTeacherUnits();
  await populateAllSelects();
}

async function renderTeacherUnits(){
  const el=document.getElementById('teacher-unit-list');
  el.innerHTML=spinner();
  const units=await dbGet('units')||{};
  el.innerHTML='';
  const arr=Object.values(units);
  if(!arr.length){ el.innerHTML='<p style="font-size:13px;color:#999">단원이 없습니다.</p>'; return; }
  for(const u of arr){
    const types=await dbGet('types/'+u.id)||{};
    const typeArr=Object.values(types);
    const wrap=document.createElement('div');
    wrap.className='card'; wrap.style.marginBottom='10px';
    let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <p style="font-weight:600;font-size:14px">📚 ${u.name}</p>
      <button class="btn btn-sm btn-danger" onclick="deleteUnit('${u.id}')">삭제</button></div>`;
    if(typeArr.length){
      typeArr.forEach(t=>{
        html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#f8faff;border-radius:8px;margin-bottom:4px">
          <span style="font-size:13px">📂 ${t.name}</span>
          <button class="btn btn-sm btn-danger" onclick="deleteType('${u.id}','${t.id}')">삭제</button></div>`;
      });
    } else {
      html+='<p style="font-size:12px;color:#999;padding:4px 8px">유형이 없습니다.</p>';
    }
    wrap.innerHTML=html;
    el.appendChild(wrap);
  }
}

async function addUnit(){
  const name=document.getElementById('new-unit-name').value.trim(); if(!name) return;
  const id=uid(); await dbSet('units/'+id,{id,name});
  document.getElementById('new-unit-name').value='';
  await renderTeacherUnits(); await populateAllSelects();
}
window.addUnit=addUnit;

async function addType(){
  const unitId=document.getElementById('type-unit-sel').value;
  const name=document.getElementById('new-type-name').value.trim();
  if(!unitId||!name) return;
  const id=uid(); await dbSet('types/'+unitId+'/'+id,{id,name});
  document.getElementById('new-type-name').value='';
  await renderTeacherUnits(); await populateAllSelects();
}
window.addType=addType;

async function deleteUnit(id){
  if(!confirm('단원과 모든 유형/문제가 삭제됩니다.')) return;
  await dbDel('units/'+id); await dbDel('types/'+id); await dbDel('questions/'+id);
  await renderTeacherUnits(); await populateAllSelects();
}
window.deleteUnit=deleteUnit;

async function deleteType(unitId,typeId){
  if(!confirm('유형과 해당 문제가 모두 삭제됩니다.')) return;
  await dbDel('types/'+unitId+'/'+typeId); await dbDel('questions/'+unitId+'/'+typeId);
  await renderTeacherUnits();
}
window.deleteType=deleteType;

async function populateAllSelects(){
  const units=await dbGet('units')||{};
  const uArr=Object.values(units);
  // type-unit-sel (단원/유형 관리 탭)
  const tus=document.getElementById('type-unit-sel');
  const prevTus=tus.value; tus.innerHTML='';
  uArr.forEach(u=>{ const o=document.createElement('option'); o.value=u.id; o.textContent=u.name; tus.appendChild(o); });
  if(prevTus) tus.value=prevTus;
  // q-unit-sel (문제 추가 탭)
  const qus=document.getElementById('q-unit-sel');
  const prevQus=qus.value; qus.innerHTML='';
  uArr.forEach(u=>{ const o=document.createElement('option'); o.value=u.id; o.textContent=u.name; qus.appendChild(o); });
  if(prevQus) qus.value=prevQus;
  await onQUnitChange();
  // filter selects
  const fus=document.getElementById('q-filter-unit');
  const prevFus=fus.value; fus.innerHTML='<option value="all">전체</option>';
  uArr.forEach(u=>{ const o=document.createElement('option'); o.value=u.id; o.textContent=u.name; fus.appendChild(o); });
  if(prevFus) fus.value=prevFus;
  await onFilterUnitChange();
}

async function onQUnitChange(){
  const unitId=document.getElementById('q-unit-sel').value;
  const sel=document.getElementById('q-type-sel2');
  sel.innerHTML='';
  if(!unitId) return;
  const types=await dbGet('types/'+unitId)||{};
  Object.values(types).forEach(t=>{ const o=document.createElement('option'); o.value=t.id; o.textContent=t.name; sel.appendChild(o); });
}
window.onQUnitChange=onQUnitChange;

async function onFilterUnitChange(){
  const unitId=document.getElementById('q-filter-unit').value;
  const sel=document.getElementById('q-filter-type');
  sel.innerHTML='<option value="all">전체</option>';
  if(unitId==='all') return;
  const types=await dbGet('types/'+unitId)||{};
  Object.values(types).forEach(t=>{ const o=document.createElement('option'); o.value=t.id; o.textContent=t.name; sel.appendChild(o); });
  await renderQList();
}
window.onFilterUnitChange=onFilterUnitChange;

function toggleQFormat(){
  const t=document.getElementById('q-format-sel').value;
  document.getElementById('mc-fields').style.display=t==='mc'?'block':'none';
  document.getElementById('sa-fields').style.display=t==='sa'?'block':'none';
}
window.toggleQFormat=toggleQFormat;

async function addQuestion(){
  const unitId=document.getElementById('q-unit-sel').value;
  const typeId=document.getElementById('q-type-sel2').value;
  const format=document.getElementById('q-format-sel').value;
  const text=document.getElementById('q-text').value.trim();
  if(!unitId||!typeId){ showErr('q-err','단원과 유형을 선택하세요'); return; }
  if(!text){ showErr('q-err','문제를 입력하세요'); return; }
  const id=uid();
  let q={id,unitId,typeId,format,text};
  if(format==='mc'){
    const opts=[1,2,3,4].map(i=>document.getElementById('opt'+i).value.trim());
    const ans=parseInt(document.getElementById('mc-ans').value)-1;
    if(opts.some(o=>!o)){ showErr('q-err','보기를 모두 입력하세요'); return; }
    if(isNaN(ans)||ans<0||ans>3){ showErr('q-err','정답 번호를 1~4로 입력하세요'); return; }
    q.opts=opts; q.ans=ans;
  } else {
    const ans=document.getElementById('sa-ans').value.trim();
    if(!ans){ showErr('q-err','정답을 입력하세요'); return; }
    q.ans=ans;
  }
  hideErr('q-err');
  await dbSet('questions/'+unitId+'/'+typeId+'/'+id,q);
  document.getElementById('q-text').value='';
  document.getElementById('sa-ans').value='';
  [1,2,3,4].forEach(i=>document.getElementById('opt'+i).value='');
  document.getElementById('mc-ans').value='';
  await renderQList(); await renderTeacherUnits();
}
window.addQuestion=addQuestion;

async function renderQList(){
  const filterUnit=document.getElementById('q-filter-unit').value;
  const filterType=document.getElementById('q-filter-type').value;
  const el=document.getElementById('q-list');
  el.innerHTML=spinner();
  const units=await dbGet('units')||{};
  const uArr=filterUnit==='all'?Object.values(units):Object.values(units).filter(u=>u.id===filterUnit);
  let all=[];
  for(const u of uArr){
    const types=await dbGet('types/'+u.id)||{};
    const tArr=filterType==='all'?Object.values(types):Object.values(types).filter(t=>t.id===filterType);
    for(const t of tArr){
      const qs=await dbGet('questions/'+u.id+'/'+t.id)||{};
      Object.values(qs).forEach(q=>all.push({...q,unitName:u.name,typeName:t.name}));
    }
  }
  el.innerHTML='';
  if(!all.length){ el.innerHTML='<p style="font-size:13px;color:#999">문제가 없습니다.</p>'; return; }
  all.forEach(q=>{
    const div=document.createElement('div');
    div.className='qitem'; div.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;gap:8px';
    div.innerHTML=`<div style="flex:1">
      <div style="display:flex;gap:5px;margin-bottom:5px;flex-wrap:wrap">
        <span class="badge badge-blue">${q.unitName}</span>
        <span class="badge badge-green">${q.typeName}</span>
        <span class="badge ${q.format==='mc'?'badge-gray':'badge-amber'}">${q.format==='mc'?'객관식':'단답형'}</span>
      </div>
      <p style="font-size:13px;font-weight:500">${q.text}</p>
      <p style="font-size:11px;color:#999;margin-top:3px">정답: ${q.format==='mc'?(q.ans+1)+'. '+q.opts[q.ans]:q.ans}</p>
    </div>
    <button class="btn btn-sm btn-danger" onclick="deleteQuestion('${q.id}','${q.unitId}','${q.typeId}')">삭제</button>`;
    el.appendChild(div);
  });
}
window.renderQList=renderQList;

async function deleteQuestion(qid,unitId,typeId){
  await dbDel('questions/'+unitId+'/'+typeId+'/'+qid);
  await renderQList(); await renderTeacherUnits();
}
window.deleteQuestion=deleteQuestion;

// ── student management ─────────────────────────────────────────────
async function renderStudentList(){
  const el=document.getElementById('student-list');
  const pel=document.getElementById('pending-list');
  const pcnt=document.getElementById('pending-count');
  el.innerHTML=spinner(); pel.innerHTML='';
  const students=await dbGet('students')||{};
  const names=Object.keys(students);
  const pending=names.filter(n=>students[n].status==='pending');
  const approved=names.filter(n=>students[n].status!=='pending');
  // pending
  pcnt.textContent=pending.length||'0';
  pcnt.style.display=pending.length?'inline-flex':'none';
  if(!pending.length){
    pel.innerHTML='<p style="font-size:13px;color:#999">대기 중인 학생이 없습니다.</p>';
  } else {
    pending.forEach(name=>{
      const div=document.createElement('div');
      div.className='qitem'; div.style.cssText='display:flex;justify-content:space-between;align-items:center;background:#fffbeb;border-color:#fcd34d';
      div.innerHTML=`<p style="font-size:14px;font-weight:600">🙋 ${name}</p>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm btn-success" onclick="approveStudent('${name}')">✅ 승인</button>
          <button class="btn btn-sm btn-danger" onclick="deleteStudent('${name}')">삭제</button>
        </div>`;
      pel.appendChild(div);
    });
  }
  // approved
  el.innerHTML='';
  if(!approved.length){ el.innerHTML='<p style="font-size:13px;color:#999">승인된 학생이 없습니다.</p>'; return; }
  approved.forEach(name=>{
    const sd=students[name];
    const attempts=Object.keys((sd&&sd.history)||{}).length;
    const wrongCnt=Object.values((sd&&sd.wrong)||{}).reduce((a,b)=>a+Object.keys(b).length,0);
    const div=document.createElement('div');
    div.className='qitem'; div.style.cssText='display:flex;justify-content:space-between;align-items:center';
    div.innerHTML=`<div><p style="font-size:14px;font-weight:600">${name}</p>
      <p style="font-size:11px;color:#999;margin-top:2px">퀴즈 ${attempts}회 · 오답 ${wrongCnt}개</p></div>
      <button class="btn btn-sm btn-danger" onclick="deleteStudent('${name}')">삭제</button>`;
    el.appendChild(div);
  });
}
window.renderStudentList=renderStudentList;

async function approveStudent(name){
  const sd=await dbGet('students/'+name);
  if(!sd) return;
  sd.status='approved';
  await dbSet('students/'+name,sd);
  await renderStudentList();
}
window.approveStudent=approveStudent;

async function deleteStudent(name){
  if(!confirm(name+'님의 계정을 삭제할까요?')) return;
  await dbDel('students/'+name);
  await renderStudentList();
}
window.deleteStudent=deleteStudent;

</script>
